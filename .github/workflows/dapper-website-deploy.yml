name: dapper-website-deploy

on:
  push:
    branches:
      - "main"
    paths:
      - "website/**"
      - ".github/workflows/dapper-website-deploy.yml"

permissions:
  contents: read

jobs:
  deploy:
    permissions:
      contents: write # to push to gh-pages
    runs-on: ubuntu-latest

    if: github.repository == 'facebookexperimental/dapper'

    env:
      working-directory: website
      node-version: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Use Node.js ${{ env.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.node-version }}

      - name: Get yarn cache directory
        id: yarn
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - name: Restore yarn cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.yarn.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('website/yarn.lock') }}

      - name: Install packages
        working-directory: ${{ env.working-directory }}
        run: yarn --frozen-lockfile

      - name: Deploy to GitHub Pages
        working-directory: ${{ env.working-directory }}
        env:
          INTERNAL_STATIC_DOCS: "0"
        run: |
          unset FB_INTERNAL
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git config --global user.name "${GITHUB_ACTOR}"
          echo "machine github.com login ${GITHUB_ACTOR} password ${{ secrets.GITHUB_TOKEN }}" > ~/.netrc
          GIT_USER=${GITHUB_ACTOR} USE_SSH=false yarn deploy
